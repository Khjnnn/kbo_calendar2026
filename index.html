<!doctype html>
<html lang="ko">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MRHWX2QY2S"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MRHWX2QY2S');
    </script>
    <meta charset="UTF-8" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="2026 KBO 야구 경기일정 및 예매일정 모바일 달력" />
    <title>⚾ 2026 KBO 달력</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5197731636415334"
     crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="app">
      <!-- 헤더 -->
      <header id="app-header">
        <img class="header-ball" src="/img/img_ball.avif" alt="야구공" width="48" height="48" />
        <h1 class="header-title">2026 KBO 캘린더</h1>
        <p class="header-sub">경기일정 · 예매일정 한눈에</p>
      </header>

      <!-- 탭 -->
      <nav id="tabs">
        <button class="tab active" data-tab="game">경기일정</button>
        <button class="tab" data-tab="ticket">예매일정</button>        
      </nav>

      <!-- 상단 광고 배너 (쿠팡 파트너스 캐러셀) -->
      <div id="ad-top" class="ad-slot">
        <script src="https://ads-partners.coupang.com/g.js"></script>
        <script>
          new PartnersCoupang.G({"id":974115,"template":"carousel","trackingCode":"AF5506052","width":"500","height":"80","tsource":""});
        </script>
      </div>
      <!-- 구단 필터 -->
      <div id="team-filter"></div>

      <!-- 월 네비게이션 -->
      <div id="month-nav">
        <button id="prev-month" aria-label="이전 월">◀</button>
        <span id="month-label"></span>
        <button id="next-month" aria-label="다음 월">▶</button>
      </div>

      <!-- 달력 그리드 -->
      <div id="calendar">
        <div class="weekday-header">
          <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span>
        </div>
        <div id="calendar-grid"></div>
      </div>

      <!-- 선택 날짜 상세 -->
      <div id="detail-panel">
        <div id="detail-date"></div>
        <div id="detail-list"></div>
      </div>

      <!-- 공지사항 -->
      <div id="notice-bar">
        <span class="notice-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        </span>
        <p class="notice-text">KBO 공식 홈페이지 기준 일정이며, 우천 취소·더블헤더 등 변동 사항은 실시간 반영이 어려울 수 있습니다.</p>
      </div>
      
      <!-- 하단 광고 배너 (쿠팡 파트너스 캐러셀) -->
      <div id="ad-bottom" class="ad-slot">
        <script>new PartnersCoupang.G({"id":973443,"template":"carousel","trackingCode":"AF5506052","width":"452","height":"50","tsource":""});</script>
      </div>

      <!-- 쿠팡 파트너스 고지 -->
      <p id="coupang-disclaimer">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</p>

    </div>
    <!-- 예매정보 모달 -->
    <div id="ticket-modal-overlay" class="modal-overlay hidden">
      <div id="ticket-modal" class="modal-content">
        <div class="modal-header">
          <span class="modal-title">🎫 예매일정</span>
          <button id="modal-close" class="modal-close" aria-label="닫기">&times;</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>

  </body>
</html>
